    tailwind.config = { darkMode: 'class' };

<body class="antialiased text-slate-900 bg-slate-50 dark:bg-[#0B0F19] dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;
    
    // --- PERLINDUNGAN RECHARTS ---
    const Recharts = window.Recharts || {};
    const { BarChart = 'div', Bar = 'div', XAxis = 'div', YAxis = 'div', CartesianGrid = 'div', Tooltip: RechartsTooltip = 'div', Legend = 'div', ResponsiveContainer = 'div', PieChart = 'div', Pie = 'div', Cell = 'div' } = Recharts;

    // --- KOLEKSI IKON INTERNAL (Bebas ralat Error #130) ---
    const SVGPaths = {

      School: <React.Fragment><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M18 5v17"/><path d="m4 6 8-4 8 4"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></React.Fragment>,
      BookOpen: <React.Fragment><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></React.Fragment>,
      AlertTriangle: <React.Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></React.Fragment>,
      BarChart2: <React.Fragment><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></React.Fragment>,
      Download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></React.Fragment>,
      Search: <React.Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></React.Fragment>,
      Moon: <React.Fragment><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></React.Fragment>,
      Sun: <React.Fragment><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></React.Fragment>,
      Menu: <React.Fragment><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></React.Fragment>,
      X: <React.Fragment><path d="M18 6 6 18"/><path d="m6 6 12 12"/></React.Fragment>,
      Filter: <React.Fragment><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></React.Fragment>,
      MapIcon: <React.Fragment><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></React.Fragment>,
      MapPin: <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></React.Fragment>,
      Briefcase: <React.Fragment><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></React.Fragment>,
      ChevronRight: <React.Fragment><path d="m9 18 6-6-6-6"/></React.Fragment>,
      AlertOctagon: <React.Fragment><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></React.Fragment>,
      Sparkles: <React.Fragment><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/></React.Fragment>,
      Home: <React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></React.Fragment>,
      GraduationCap: <React.Fragment><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></React.Fragment>,
      PieChartIcon: <React.Fragment><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></React.Fragment>
    };

    const CustomIcon = ({ name, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || 'w-5 h-5'}>
        {SVGPaths[name]}
      </svg>
    );

    const LayoutDashboard = (p) => <CustomIcon name="LayoutDashboard" {...p} />;
    const Users = (p) => <CustomIcon name="Users" {...p} />;
    const School = (p) => <CustomIcon name="School" {...p} />;
    const BookOpen = (p) => <CustomIcon name="BookOpen" {...p} />;
    const AlertTriangle = (p) => <CustomIcon name="AlertTriangle" {...p} />;
    const BarChart2 = (p) => <CustomIcon name="BarChart2" {...p} />;
    const Download = (p) => <CustomIcon name="Download" {...p} />;
    const Search = (p) => <CustomIcon name="Search" {...p} />;
    const Moon = (p) => <CustomIcon name="Moon" {...p} />;
    const Sun = (p) => <CustomIcon name="Sun" {...p} />;
    const Menu = (p) => <CustomIcon name="Menu" {...p} />;
    const X = (p) => <CustomIcon name="X" {...p} />;
    const Filter = (p) => <CustomIcon name="Filter" {...p} />;
    const MapIcon = (p) => <CustomIcon name="MapIcon" {...p} />;
    const MapPin = (p) => <CustomIcon name="MapPin" {...p} />;
    const Briefcase = (p) => <CustomIcon name="Briefcase" {...p} />;
    const ChevronRight = (p) => <CustomIcon name="ChevronRight" {...p} />;
    const AlertOctagon = (p) => <CustomIcon name="AlertOctagon" {...p} />;
    const Sparkles = (p) => <CustomIcon name="Sparkles" {...p} />;
    const Home = (p) => <CustomIcon name="Home" {...p} />;
    const GraduationCap = (p) => <CustomIcon name="GraduationCap" {...p} />;
    const PieChartIcon = (p) => <CustomIcon name="PieChartIcon" {...p} />;

    // --- DATA MOCKUP DEFAULT ---
    const MOCK_DATA = [
      { id: 1, bil: 1, zon: 'BANGSAR', kod_sekolah: 'WBA0001', nama_sekolah: 'SK BANGSAR', nama: 'AHMAD BIN ABU', ikhtisas: 'SMP', opsyen_1: 'MATEMATIK', opsyen_2: 'SAINS', opsyen_3: '', ikhtisas_conversion: '', conversion_pito: '', opsyen_dominan: 'MATEMATIK', subjek_ajar1: 'MATEMATIK', bil_waktu1: 12, subjek_ajar2: 'BAHASA MELAYU', bil_waktu2: 6, subjek_ajar3: '', bil_waktu3: 0, jawatan: 'GURU AKADEMIK BIASA', gred_penyandang: 'DG44', gred_hakiki: 'DG44', tarikh_khidmat_semasa: '2015-01-01' },
    ];

    const COLORS = ['#0ea5e9', '#8b5cf6', '#ec4899', '#14b8a6', '#f59e0b', '#f43f5e', '#6366f1'];

    // --- PARSER CSV ---
    const parseCSV = (str) => {
      const arr = [];
      let quote = false;
      let row = 0, col = 0;
      for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c+1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';

        if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
        if (cc === '"') { quote = !quote; continue; }
        if (cc === ',' && !quote) { ++col; continue; }
        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
        arr[row][col] += cc;
      }
      
      if (arr.length < 2) return [];
      const headers = arr[0].map(h => h.replace(/\n|\r/g, ' ').replace(/\s+/g, ' ').trim().toUpperCase());
      
      const result = [];
      for (let i = 1; i < arr.length; i++) {
        if (!arr[i] || arr[i].join('').trim() === '') continue; 
        const obj = {};
        headers.forEach((h, j) => { obj[h] = arr[i][j] ? arr[i][j].trim() : ''; });
        result.push(obj);
      }
      return result;
    };

    const getVal = (row, keys) => {
      for (let k of keys) {
        if (row[k] !== undefined && row[k] !== null) return row[k];
      }
      return '';
    };

    const renderCustomizedLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
      const RADIAN = Math.PI / 180;
      const radius = innerRadius + (outerRadius - innerRadius) * 0.5;
      const x = cx + radius * Math.cos(-midAngle * RADIAN);
      const y = cy + radius * Math.sin(-midAngle * RADIAN);
      if (percent < 0.04) return null;
      return (
        <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize={12} fontWeight="bold" style={{ textShadow: '0px 2px 4px rgba(0,0,0,0.8)' }}>
          {`${(percent * 100).toFixed(0)}%`}
        </text>
      );
    };

    // --- KOMPONEN UI ---
    const Card = ({ children, className = "" }) => (
      <div className={`bg-white/90 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-sm hover:shadow-xl dark:shadow-indigo-500/10 border border-slate-200/60 dark:border-indigo-500/10 transition-all duration-300 relative overflow-hidden group ${className}`}>
        <div className="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent dark:from-white/5 dark:to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
        {children}
      </div>
    );

    const KPICard = ({ title, value, icon: IconBase, trend, colorClass }) => (
      <Card className="p-6 md:p-8 flex items-center justify-between">
        <div className="relative z-10">
          <p className="text-sm md:text-base font-bold text-slate-500 dark:text-indigo-200/70 mb-1 uppercase tracking-widest">{title}</p>
          <h3 className="text-4xl md:text-5xl font-black text-slate-800 dark:text-white tracking-tight">{value}</h3>
          {trend && <p className="text-xs md:text-sm text-indigo-500 dark:text-cyan-400 mt-2 font-semibold flex items-center gap-1"><CustomIcon name="Sparkles" className="w-4 h-4"/> {trend}</p>}
        </div>
        <div className={`p-4 md:p-5 rounded-2xl bg-gradient-to-br ${colorClass} text-white shadow-lg transform group-hover:scale-110 transition-all duration-300`}>
          <IconBase className="w-8 h-8 md:w-10 md:h-10" />
        </div>
      </Card>
    );

    const TableViewHeader = ({ title, subtitle, searchQuery, setSearchQuery, onExport }) => (
      <div className="p-4 md:p-5 border-b border-slate-100 dark:border-indigo-500/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white/50 dark:bg-slate-900/50">
        <div>
          <h2 className="text-lg md:text-xl font-bold text-slate-800 dark:text-white tracking-tight">{title}</h2>
          {subtitle && <p className="text-xs md:text-sm text-slate-500 dark:text-indigo-200/60 mt-1">{subtitle}</p>}
        </div>
        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto">
          <div className="relative flex-1 sm:w-64">
            <CustomIcon name="Search" className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
            <input 
              type="text" placeholder="Carian pintar..." 
              className="w-full pl-9 pr-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent text-sm transition-shadow shadow-sm"
              value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
            />
          </div>
          <button onClick={onExport} className="flex justify-center items-center gap-2 px-4 py-2 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-white rounded-xl transition-all shadow-lg shadow-teal-500/20 text-sm font-semibold whitespace-nowrap">
            <CustomIcon name="Download" className="w-4 h-4" />
            <span>Eksport CSV</span>
          </button>
        </div>
      </div>
    );

    // --- KONTAINER TABEL DRAGGABLE ---
    const DraggableTableContainer = ({ children }) => {
      const containerRef = useRef(null);
      const [isDown, setIsDown] = useState(false);
      const [startX, setStartX] = useState(0);
      const [scrollLeft, setScrollLeft] = useState(0);

      const handleMouseDown = (e) => {
        setIsDown(true);
        setStartX(e.pageX - containerRef.current.offsetLeft);
        setScrollLeft(containerRef.current.scrollLeft);
        containerRef.current.style.cursor = 'grabbing';
        containerRef.current.style.userSelect = 'none';
      };

      const handleMouseLeave = () => {
        setIsDown(false);
        if(containerRef.current) {
            containerRef.current.style.cursor = 'grab';
            containerRef.current.style.userSelect = 'auto';
        }
      };

      const handleMouseUp = () => {
        setIsDown(false);
        if(containerRef.current) {
            containerRef.current.style.cursor = 'grab';
            containerRef.current.style.userSelect = 'auto';
        }
      };

      const handleMouseMove = (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - containerRef.current.offsetLeft;
        const walk = (x - startX) * 1.5; 
        containerRef.current.scrollLeft = scrollLeft - walk;
      };

      return (
        <div
          ref={containerRef}
          className="flex-1 p-0 scrollbar-thin table-scroll-container"
          style={{ cursor: 'grab' }}
          onMouseDown={handleMouseDown}
          onMouseLeave={handleMouseLeave}
          onMouseUp={handleMouseUp}
          onMouseMove={handleMouseMove}
        >
          {children}
        </div>
      );
    };

    // --- KOMPONEN UTAMA (APP) ---
    function App() {
      const [appMode, setAppMode] = useState('landing');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isDarkMode, setIsDarkMode] = useState(true); 
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedZone, setSelectedZone] = useState('ALL');
      const [selectedSchool, setSelectedSchool] = useState('ALL');

      const [liveData, setLiveData] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [dataError, setDataError] = useState(false);

      const availableZones = useMemo(() => {
        const zones = new Set(liveData.map(d => d.zon).filter(Boolean));
        return Array.from(zones).sort();
      }, [liveData]);

      const availableSchools = useMemo(() => {
        let filtered = liveData;
        if (selectedZone !== 'ALL') {
          filtered = filtered.filter(d => d.zon === selectedZone);
        }
        const schools = new Set(filtered.map(d => d.nama_sekolah).filter(Boolean));
        return Array.from(schools).sort();
      }, [liveData, selectedZone]);

      useEffect(() => {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement('link');
          link.rel = 'icon';
          document.head.appendChild(link);
        }
        link.href = 'https://i.postimg.cc/Y9ynZMmw/LOGO-PPDBP-FONT-HITAM.png';
        document.title = 'Sistem Analitik Opsyen PPDBP';
      }, []);

      useEffect(() => {
        if (appMode === 'landing') return;

        const fetchCSV = async () => {
          try {
            setIsLoading(true);
            setDataError(false);
            const gid = appMode === 'SM' ? '1852678103' : '1406432906';
            const response = await fetch(`https://docs.google.com/spreadsheets/d/e/2PACX-1vQeeJ71FzcyQAbRArjF2znlPd55X8U3GFGnRfmJyBhcRXLGWsqIXmzbhoHzWwvwYVYZTXzIWJyWhQHY/pub?output=csv&gid=${gid}&t=${new Date().getTime()}`);
            
            if (!response.ok) throw new Error("Gagal mengambil data dari Google Sheets");

            const text = (await response.text()).replace(/^\uFEFF/, ''); 
            const parsed = parseCSV(text);
            
            const mappedData = parsed.map((row, index) => ({
              id: index + 1,
              bil: getVal(row, ['BIL', 'NO']) || index + 1,
              zon: getVal(row, ['ZON', 'DAERAH']).trim().toUpperCase(),
              kod_sekolah: getVal(row, ['KOD SEKOLAH', 'KOD']),
              nama_sekolah: getVal(row, ['NAMA SEKOLAH', 'SEKOLAH']),
              nama: getVal(row, ['NAMA', 'NAMA GURU', 'NAMA PENUH']),
              ikhtisas: getVal(row, ['IKHTISAS', 'KELAYAKAN IKHTISAS']),
              pengkhususan_dip: getVal(row, ['PENGKHUSUSAN DIP', 'DIPLOMA']),
              pengkhususan_ism: getVal(row, ['PENGKHUSUSAN ISM', 'PENKGHUSUSAN ISM', 'IJAZAH']),
              pengkhususan_isl: getVal(row, ['PENGKHUSUSAN ISL', 'PENKGHUSUSAN ISL']),
              pengkhususan_phd: getVal(row, ['PENGKHUSUSAN PHD', 'PENGHUSUSAN PHD', 'PHD']),
              opsyen_1: getVal(row, ['OPSYEN 1', 'OPSYEN PERTAMA']),
              opsyen_2: getVal(row, ['OPSYEN 2', 'OPSYEN KEDUA']),
              opsyen_3: getVal(row, ['OPSYEN 3', 'OPSYEN KETIGA']),
              opsyen_dominan: getVal(row, ['OPSYEN DOMINAN', 'DOMINAN']),
              subjek_ajar1: getVal(row, ['SUBJEK AJAR1', 'SUBJEK AJAR 1', 'SUBJEK 1']),
              bil_waktu1: parseInt(getVal(row, ['BIL WAKTU1', 'BIL WAKTU 1', 'WAKTU 1'])) || 0,
              subjek_ajar2: getVal(row, ['SUBJEK AJAR2', 'SUBJEK AJAR 2', 'SUBJEK 2']),
              bil_waktu2: parseInt(getVal(row, ['BIL WAKTU2', 'BIL WAKTU 2', 'WAKTU 2'])) || 0,
              subjek_ajar3: getVal(row, ['SUBJEK AJAR3', 'SUBJEK AJAR 3', 'SUBJEK 3']),
              bil_waktu3: parseInt(getVal(row, ['BIL WAKTU3', 'BIL WAKTU 3', 'WAKTU 3'])) || 0,
              gred_penyandang: getVal(row, ['GRED PENYANDANG', 'GRED'])
            })).filter(d => d.nama && d.nama.trim() !== '' && d.nama_sekolah && d.nama_sekolah.trim() !== ''); 

            if (mappedData.length > 0) {
              setLiveData(mappedData);
            } else {
              console.warn("Data gagal dipeta. Pastikan lajur 'NAMA' dan 'NAMA SEKOLAH' wujud.");
              setDataError(true);
              setLiveData(MOCK_DATA);
            }
          } catch (error) {
            console.error("Error fetching CSV:", error);
            setDataError(true);
            setLiveData(MOCK_DATA);
          } finally {
            setIsLoading(false);
          }
        };

        fetchCSV();
      }, [appMode]);

      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDarkMode]);

      const analyticsData = useMemo(() => {
        let baseData = liveData;
        
        if (selectedZone !== 'ALL') {
          baseData = baseData.filter(d => d.zon === selectedZone);
        }
        if (selectedSchool !== 'ALL') {
          baseData = baseData.filter(d => d.nama_sekolah === selectedSchool);
        }
        if (searchQuery) {
          const lowerQuery = searchQuery.toLowerCase();
          baseData = baseData.filter(d => 
            (d.nama && d.nama.toLowerCase().includes(lowerQuery)) || 
            (d.nama_sekolah && d.nama_sekolah.toLowerCase().includes(lowerQuery)) ||
            (d.opsyen_dominan && d.opsyen_dominan.toLowerCase().includes(lowerQuery)) ||
            (d.subjek_ajar1 && d.subjek_ajar1.toLowerCase().includes(lowerQuery)) ||
            (d.subjek_ajar2 && d.subjek_ajar2.toLowerCase().includes(lowerQuery))
          );
        }

        const isJawatanOption = (val) => {
          if (!val) return false;
          const upper = String(val).trim().toUpperCase();
          const jawatanList = ['GURU BESAR', 'PENGETUA', 'PENOLONG KANAN', 'PK PENTADBIRAN', 'PK HEM', 'PK KOKU', 'PK KOKURIKULUM', 'PK PETANG', 'PK TINGKATAN 6', 'PK PENDIDIKAN KHAS', 'GURU KANAN', 'GKMP'];
          return jawatanList.some(j => upper.includes(j)) || upper === 'PK' || upper === 'GPK' || upper === 'GB';
        };

        const keywordGroups = [
          ['MELAYU', 'BM', 'B.M'],
          ['INGGERIS', 'BI', 'B.I', 'ENGLISH', 'ENG'],
          ['ISLAM', 'PI', 'P.I', 'AGAMA', 'PAI', 'TASAWWUR', 'SYARIAH', 'AL-QURAN', 'SUNNAH', 'USULUDDIN'],
          ['MORAL', 'PM', 'P.M'],
          ['MATEMATIK', 'MATH', 'MATHS', 'MT', 'MATE', 'TAMBAHAN', 'ADD MATH'],
          ['SAINS', 'SCIENCE', 'SN', 'SC'],
          ['SEJARAH', 'SEJ'],
          ['GEOGRAFI', 'GEO'],
          ['JASMANI', 'KESIHATAN', 'PJK', 'PJ', 'PK', 'PEND. JASMANI'],
          ['SENI', 'PSV', 'S.VISUAL', 'DSV', 'SENI VISUAL'],
          ['MUZIK', 'PMZ'],
          ['RBT', 'REKA BENTUK', 'TEKNOLOGI', 'KEMAHIRAN HIDUP', 'KHB', 'SRT', 'ERT'],
          ['PRASEKOLAH', 'PRA SEKOLAH', 'PRA'],
          ['PEMULIHAN'],
          ['ARAB', 'B.A', 'B.ARAB'],
          ['CINA', 'BC', 'B.C', 'B.CINA'],
          ['TAMIL', 'BT', 'B.T', 'B.TAMIL'],
          ['FIZIK', 'PHYSICS'],
          ['KIMIA', 'CHEMISTRY'],
          ['BIOLOGI', 'BIOLOGY'],
          ['AKAUN', 'PERAKAUNAN', 'PA'],
          ['EKONOMI'],
          ['PERNIAGAAN', 'P.PERNIAGAAN'],
          ['KOMPUTER', 'ASK', 'SK', 'TMK', 'SAINS KOMPUTER'],
          ['PENGURUSAN', 'PPB']
        ];

        const isMatchFn = (optArr, subjStr) => {
          const s = String(subjStr).trim().toUpperCase();
          if (!s || s === '-') return false;
          return optArr.some(o => {
            const opt = String(o).trim().toUpperCase();
            if (s === opt) return true;
            if (s.length > 4 && opt.includes(s)) return true;
            if (opt.length > 4 && s.includes(opt)) return true;

            for (const group of keywordGroups) {
              const hasKeyword = (str, kw) => {
                if (str === kw) return true;
                if (kw.length <= 3) {
                  const regex = new RegExp('(^|[^A-Z0-9])' + kw.replace(/\./g, '\\.') + '([^A-Z0-9]|$)');
                  return regex.test(str);
                }
                return str.includes(kw);
              };
              if (group.some(kw => hasKeyword(opt, kw)) && group.some(kw => hasKeyword(s, kw))) return true;
            }
            return false;
          });
        };

        const enrichedData = baseData.map(d => {
          const options = [
            d.opsyen_1, d.opsyen_2, d.opsyen_3, d.opsyen_dominan,
            d.pengkhususan_dip, d.pengkhususan_ism, d.pengkhususan_isl, d.pengkhususan_phd
          ].filter(Boolean).map(o => String(o).trim().toUpperCase()).filter(o => !isJawatanOption(o));
            
          let waktuOpsyen = 0;
          let waktuLain = 0;
          let subjekBukanOpsyen = [];

          const checkSubjek = (subjek, waktu) => {
            if (!subjek || String(subjek).trim() === '' || String(subjek).trim() === '-') return;
            const s = String(subjek).trim().toUpperCase();
            let w = parseInt(String(waktu).replace(/[^0-9]/g, ''));
            if (isNaN(w) || w <= 0) w = 1; 
            
            if (isMatchFn(options, s)) {
              waktuOpsyen += w;
            } else {
              waktuLain += w;
              const displayW = (w === 1 && (!waktu || parseInt(waktu) === 0)) ? '?' : w;
              subjekBukanOpsyen.push(`${s} (${displayW})`);
            }
          };

          checkSubjek(d.subjek_ajar1, d.bil_waktu1);
          checkSubjek(d.subjek_ajar2, d.bil_waktu2);
          checkSubjek(d.subjek_ajar3, d.bil_waktu3);

          const totalWaktu = waktuOpsyen + waktuLain;
          const peratusOpsyen = totalWaktu > 0 ? Math.round((waktuOpsyen / totalWaktu) * 100) : 0;
          const statusLuarOpsyen = totalWaktu > 0 && waktuOpsyen < waktuLain;

          const validDisplayOptions = [
            d.opsyen_dominan, d.pengkhususan_ism, d.opsyen_1, d.pengkhususan_dip, d.opsyen_2
          ].filter(Boolean).map(o => String(o).trim().toUpperCase()).filter(o => !isJawatanOption(o));

          const displayOpsyen = validDisplayOptions.length > 0 ? validDisplayOptions[0] : 'TIADA REKOD';

          return { ...d, waktuOpsyen, waktuLain, totalWaktu, peratusOpsyen, statusLuarOpsyen, subjekBukanOpsyen: subjekBukanOpsyen.join(', '), displayOpsyen };
        });

        const totalGuru = enrichedData.length;
        const riskData = enrichedData.filter(d => d.statusLuarOpsyen).sort((a, b) => a.peratusOpsyen - b.peratusOpsyen);
        const guruLuarOpsyen = riskData.length;
        const totalWaktuCount = enrichedData.reduce((sum, guru) => sum + guru.totalWaktu, 0);
        const avgWaktu = totalGuru ? (totalWaktuCount / totalGuru).toFixed(1) : 0;

        const opsyenCounts = {};
        enrichedData.forEach(d => {
          const ops = d.displayOpsyen ? d.displayOpsyen.trim() : 'TIADA MAKLUMAT';
          if (ops !== '') opsyenCounts[ops] = (opsyenCounts[ops] || 0) + 1;
        });
        const optionStats = Object.entries(opsyenCounts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);

        let pieData = [];
        if (optionStats.length > 5) {
          pieData = optionStats.slice(0, 5);
          const othersCount = optionStats.slice(5).reduce((sum, item) => sum + item.count, 0);
          if (othersCount > 0) pieData.push({ name: 'LAIN-LAIN', value: othersCount });
        } else {
          pieData = optionStats.map(o => ({ name: o.name, value: o.count }));
        }

        const subjectMap = {};
        enrichedData.forEach(d => {
          const addSubj = (subj, hours) => {
            if (!subj || subj.trim() === '') return;
            const s = subj.trim().toUpperCase();
            if (!subjectMap[s]) subjectMap[s] = { name: s, count: 0, hours: 0 };
            subjectMap[s].count++;
            subjectMap[s].hours += (parseInt(hours) || 0);
          };
          addSubj(d.subjek_ajar1, d.bil_waktu1);
          addSubj(d.subjek_ajar2, d.bil_waktu2);
          addSubj(d.subjek_ajar3, d.bil_waktu3);
        });
        const subjectStats = Object.values(subjectMap).map(s => ({ ...s, avgHours: s.count ? (s.hours / s.count).toFixed(1) : 0 })).sort((a, b) => b.count - a.count);

        const schoolMap = {};
        enrichedData.forEach(d => {
          const s = d.nama_sekolah || 'TIADA NAMA SEKOLAH';
          if (!schoolMap[s]) { schoolMap[s] = { name: s, zon: d.zon, totalGuru: 0, luarOpsyen: 0, totalHours: 0, Subjek1: 0, Subjek2: 0, Subjek3: 0 }; }
          schoolMap[s].totalGuru++;
          if (d.statusLuarOpsyen) schoolMap[s].luarOpsyen++;
          schoolMap[s].totalHours += d.totalWaktu;
          schoolMap[s].Subjek1 += d.bil_waktu1 || 0;
          schoolMap[s].Subjek2 += d.bil_waktu2 || 0;
          schoolMap[s].Subjek3 += d.bil_waktu3 || 0;
        });
        const schoolStats = Object.values(schoolMap).map(s => ({
          ...s, avgHours: s.totalGuru ? (s.totalHours / s.totalGuru).toFixed(1) : 0, riskPct: s.totalGuru ? parseFloat(((s.luarOpsyen / s.totalGuru) * 100).toFixed(1)) : 0
        })).sort((a, b) => b.riskPct - a.riskPct);

        const highRiskSchools = [...schoolStats].filter(s => s.luarOpsyen > 0).slice(0, 5);

        const luarOpsyenByZone = {};
        riskData.forEach(d => {
          const z = d.zon ? String(d.zon).toUpperCase().trim() : 'LAIN-LAIN';
          luarOpsyenByZone[z] = (luarOpsyenByZone[z] || 0) + 1;
        });
        const barDataLuar = Object.entries(luarOpsyenByZone).map(([zon, count]) => ({ zon, count }));

        const optionsBySchool = {};
        enrichedData.forEach(d => {
          const schoolName = d.nama_sekolah || 'TIADA NAMA SEKOLAH';
          if (!optionsBySchool[schoolName]) optionsBySchool[schoolName] = new Set();
          const ops = [d.opsyen_1, d.opsyen_2, d.opsyen_3, d.opsyen_dominan, d.pengkhususan_dip, d.pengkhususan_ism, d.pengkhususan_isl, d.pengkhususan_phd]
            .filter(Boolean).map(o => String(o).trim().toUpperCase()).filter(o => !isJawatanOption(o));
          ops.forEach(o => optionsBySchool[schoolName].add(o));
        });

        const schoolStatus = {};
        enrichedData.forEach(d => {
          const schoolName = d.nama_sekolah || 'TIADA NAMA SEKOLAH';
          if (!schoolStatus[schoolName]) {
            schoolStatus[schoolName] = { name: schoolName, "Ajar Opsyen": 0, "Luar Opsyen": 0, "Ketidakpadanan": 0 };
          }
          if (!d.statusLuarOpsyen) {
            schoolStatus[schoolName]["Ajar Opsyen"]++;
          } else {
            let schoolHasOption = false;
            const optionsOfTeacher = [d.opsyen_1, d.opsyen_2, d.opsyen_3, d.opsyen_dominan, d.pengkhususan_dip, d.pengkhususan_ism, d.pengkhususan_isl, d.pengkhususan_phd]
              .filter(Boolean).map(o => String(o).trim().toUpperCase()).filter(o => !isJawatanOption(o));
            const subjectsTeaching = [d.subjek_ajar1, d.subjek_ajar2, d.subjek_ajar3].filter(Boolean).map(s => String(s).trim().toUpperCase());
            const schoolOptsArr = Array.from(optionsBySchool[schoolName] || []);

            for (let s of subjectsTeaching) {
                if (!isMatchFn(optionsOfTeacher, s) && isMatchFn(schoolOptsArr, s)) {
                    schoolHasOption = true;
                    break;
                }
            }
            if (schoolHasOption) { schoolStatus[schoolName]["Ketidakpadanan"]++; } 
            else { schoolStatus[schoolName]["Luar Opsyen"]++; }
          }
        });
        const statusPenempatanData = Object.values(schoolStatus);

        return { totalGuru, guruLuarOpsyen, totalWaktu: totalWaktuCount, avgWaktu, pieData, barDataLuar, schoolStats, filteredData: enrichedData, riskData, highRiskSchools, statusPenempatanData, subjectStats, optionStats };
      }, [searchQuery, selectedZone, selectedSchool, liveData]);

      const exportToCSV = () => {
        let dataToExport = [];
        let filename = "Laporan.csv";

        if (activeTab === 'subjek_ajar') {
          dataToExport = analyticsData.subjectStats.map((d, i) => ({ Bil: i+1, Subjek: d.name, "Bilangan Guru": d.count, "Jumlah Waktu Keseluruhan": d.hours, "Purata Waktu/Guru": d.avgHours }));

          dataToExport = analyticsData.optionStats.map((d, i) => ({ Bil: i+1, "Opsyen Dominan": d.name, "Bilangan Kepakaran (Guru)": d.count }));
          filename = "Analitik_Opsyen_Kepakaran.csv";
        } else if (activeTab === 'luar_opsyen') {
          dataToExport = analyticsData.riskData.map((d, i) => ({ Bil: i+1, Sekolah: d.nama_sekolah, "Nama Guru": d.nama, "Opsyen Dominan": d.displayOpsyen, "Waktu Mengajar Opsyen": d.waktuOpsyen, "Waktu Luar Opsyen": d.waktuLain, "Peratusan Opsyen (%)": d.peratusOpsyen, "Subjek Bukan Opsyen (Waktu)": d.subjekBukanOpsyen }));
          filename = "Senarai_Guru_Kurang_Mengajar_Opsyen.csv";
        } else {
          dataToExport = analyticsData.filteredData.map((d, i) => ({ Bil: i+1, Zon: d.zon, Sekolah: d.nama_sekolah, "Nama Guru": d.nama, Ikhtisas: d.ikhtisas, "Opsyen Dominan": d.displayOpsyen, "Subjek 1": d.subjek_ajar1, "Waktu 1": d.bil_waktu1, "Subjek 2": d.subjek_ajar2, "Waktu 2": d.bil_waktu2 }));
          filename = "Pangkalan_Data_Guru.csv";
        }

        if (dataToExport.length === 0) return;
        const headers = Object.keys(dataToExport[0] || {}).join(',');
        const rows = dataToExport.map(row => Object.values(row).map(val => `"${String(val).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([`${headers}\n${rows}`], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

                </button>
                <button onClick={() => { setAppMode('SM'); setActiveTab('dashboard'); setSelectedZone('ALL'); setSelectedSchool('ALL'); setSearchQuery(''); }} className="group text-left p-10 md:p-14 rounded-[2.5rem] bg-white dark:bg-slate-900/60 backdrop-blur-2xl border-2 border-slate-200 dark:border-indigo-500/20 hover:border-violet-500 dark:hover:border-violet-400/50 hover:shadow-[0_20px_50px_rgba(139,92,246,0.2)] transition-all duration-500 relative overflow-hidden pointer-events-auto">
                  <div className="absolute inset-0 bg-gradient-to-br from-violet-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                  <div className="relative z-10">
                    <div className="w-20 h-20 md:w-24 md:h-24 rounded-3xl bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center text-white mb-8 shadow-2xl group-hover:scale-110 group-hover:rotate-6 transition-all duration-500"><CustomIcon name="GraduationCap" className="w-10 h-10 md:w-12 md:h-12" /></div>
                    <h3 className="text-3xl md:text-4xl font-black text-slate-800 dark:text-white mb-3">Sekolah Menengah</h3>
                    <p className="text-base md:text-xl text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">Pemetaan analitik kepakaran guru bagi menyokong intervensi pedagogi (SM).</p>
                  </div>
                </button>
              </div>
            </div>
            
            {/* Footer Animasi Gambar Tunggal Besar */}
            <div className="relative w-full min-h-[180px] flex flex-col justify-end items-center overflow-hidden z-0 pointer-events-none mt-auto border-t border-slate-200/50 dark:border-slate-800/50">
              <style>{`
                @keyframes slideAcross { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
                .image-wrapper { position: absolute; top: 10px; height: 120px; display: flex; align-items: center; animation: slideAcross 30s linear infinite; white-space: nowrap; }
                .img-slide { height: 100%; max-height: 120px; width: auto; object-fit: contain; opacity: 0.8; }
                .dark .img-slide { opacity: 0.5; }
              `}</style>
              
              <div className="image-wrapper">
                <img src="https://i.postimg.cc/R0nkkSK1/Untitled-design-(2).png" alt="Hiasan Latar" className="img-slide" />
              </div>

              <div className="relative z-10 w-full text-center text-slate-700 dark:text-slate-300 text-xs md:text-sm font-bold tracking-[0.2em] uppercase py-6 bg-gradient-to-t from-slate-50 dark:from-[#0B0F19] to-transparent">
                Dibangunkan Oleh Sektor Pembelajaran PPDBP
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={`w-full h-full bg-slate-50 dark:bg-[#0B0F19] text-slate-900 dark:text-slate-100 transition-colors duration-300 flex font-sans ${isDarkMode ? 'dark' : ''} selection:bg-indigo-500/30 overflow-hidden`}>
          <aside className={`absolute md:relative inset-y-0 left-0 z-50 w-64 md:w-72 bg-white dark:bg-[#0f172a] border-r border-slate-200 dark:border-slate-800/80 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'} md:translate-x-0 flex-shrink-0 flex flex-col shadow-sm h-full`}>
            <div className="p-4 md:p-6 flex items-center justify-between border-b border-slate-100 dark:border-slate-800/80">
              <div className="flex items-center gap-3 md:gap-4">
                <div className={`w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-bold text-white shadow-lg ${appMode === 'SR' ? 'bg-gradient-to-br from-cyan-400 to-blue-600 shadow-blue-500/30' : 'bg-gradient-to-br from-violet-400 to-fuchsia-600 shadow-violet-500/30'}`}>
                  {appMode === 'SR' ? <CustomIcon name="School" className="w-4 h-4 md:w-5 md:h-5" /> : <CustomIcon name="GraduationCap" className="w-4 h-4 md:w-5 md:h-5" />}
                </div>
                <div>
                  <h1 className="font-black text-base md:text-lg leading-none tracking-tight text-slate-800 dark:text-white uppercase">Analitik<span className={appMode === 'SR' ? 'text-blue-500 dark:text-cyan-400' : 'text-violet-500 dark:text-violet-400'}>.</span>{appMode}</h1>
                  <span className="text-slate-500 dark:text-slate-400 text-[10px] md:text-xs font-semibold tracking-wider">ZON BANGSAR/PUDU</span>
                </div>
              </div>
              <button className="md:hidden text-slate-400 hover:text-slate-600 dark:hover:text-white p-1" onClick={() => setIsSidebarOpen(false)}>
                <CustomIcon name="X" className="w-5 h-5" />
              </button>
            </div>
            <div className="flex-1 overflow-y-auto py-4 md:py-6 px-3 md:px-4 space-y-1.5 scrollbar-thin">
              <button onClick={() => { setAppMode('landing'); setActiveTab('dashboard'); setIsSidebarOpen(false); }} className="w-full flex items-center gap-3 px-3 py-2.5 md:px-4 md:py-3 rounded-xl transition-all duration-300 text-xs md:text-sm font-semibold text-rose-500 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-500/10 mb-4 border border-transparent hover:border-rose-200 dark:hover:border-rose-500/30">
                <CustomIcon name="Home" className="w-4 h-4 md:w-5 md:h-5" /> Kembali ke Utama
              </button>
              <p className="px-3 text-[9px] md:text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 md:mb-3">Papan Kawalan</p>
              {SIDEBAR_MENU.map((item) => {
                const isActive = activeTab === item.id;
                return (
                  <button key={item.id} onClick={() => { setActiveTab(item.id); if (item.id === 'zon_bangsar') { setSelectedZone('BANGSAR'); setSelectedSchool('ALL'); } else if (item.id === 'zon_pudu') { setSelectedZone('PUDU'); setSelectedSchool('ALL'); } else { setSelectedZone('ALL'); setSelectedSchool('ALL'); } if (window.innerWidth < 768) setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-3 py-2.5 md:px-4 md:py-3 rounded-xl transition-all duration-300 text-xs md:text-sm font-semibold relative overflow-hidden ${isActive ? 'text-white shadow-lg shadow-indigo-500/25 bg-gradient-to-r from-indigo-600 to-violet-600' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-slate-200'}`}>
                    {isActive && <div className="absolute left-0 top-0 bottom-0 w-1 bg-cyan-400"></div>}
                    <CustomIcon name={item.id === 'dashboard' ? 'LayoutDashboard' : item.id === 'subjek_ajar' ? 'BookOpen' : item.id === 'profil_guru' ? 'Users' : item.id === 'luar_opsyen' ? 'AlertTriangle' : item.id === 'statistik' ? 'BarChart2' : item.id === 'analisis_opsyen' ? 'PieChartIcon' : 'MapPin'} className={`w-4 h-4 md:w-5 md:h-5 transition-colors ${isActive ? 'text-white' : 'text-slate-400 dark:text-slate-500'}`} />
                    {item.label}
                  </button>
                )
              })}
            </div>
          </aside>
          
          <main className="flex-1 flex flex-col min-w-0 h-full relative z-0">
            <header className="h-16 md:h-20 bg-white/80 dark:bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800/80 flex items-center justify-between px-4 md:px-8 z-10 shrink-0 shadow-sm">
              <div className="flex items-center gap-3 md:gap-4">
                <button className="md:hidden p-1.5 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg" onClick={() => setIsSidebarOpen(true)}>
                  <CustomIcon name="Menu" className="w-5 h-5" />
                </button>
                <div className="hidden sm:flex items-center text-xs md:text-sm font-bold text-slate-400 dark:text-slate-500 tracking-wide">
                  <span>Sistem Analitik</span>
                  <span className="ml-2 md:ml-3 px-2 py-0.5 md:px-2.5 md:py-1 bg-gradient-to-r from-indigo-500 to-violet-500 text-white rounded-md text-[9px] md:text-[10px] font-black uppercase tracking-wider shadow-md shadow-indigo-500/20">Sekolah {appMode === 'SR' ? 'Rendah' : 'Menengah'}</span>
                  <CustomIcon name="ChevronRight" className="w-3 h-3 md:w-4 md:h-4 mx-1.5 md:mx-2 text-slate-300 dark:text-slate-600" />
                  <span className="text-slate-800 dark:text-slate-200">{SIDEBAR_MENU.find(m => m.id === activeTab)?.label}</span>
                </div>
              </div>
              <div className="flex items-center gap-2 md:gap-4">
                <div className="relative flex items-center gap-1 md:gap-2">
                  <CustomIcon name="Filter" className="w-3 h-3 md:w-4 md:h-4 text-slate-400 hidden sm:block" />
                  <select className="bg-slate-100 dark:bg-slate-800 border-none text-slate-700 dark:text-slate-200 text-xs md:text-sm font-semibold rounded-md md:rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none w-[90px] sm:w-[110px] md:w-[140px] p-1.5 md:p-2.5 cursor-pointer shadow-sm" value={selectedZone} onChange={(e) => { setSelectedZone(e.target.value); setSelectedSchool('ALL'); }}>
                    <option value="ALL">Semua Zon</option>
                    {availableZones.map(zon => (<option key={zon} value={zon}>Zon {zon.charAt(0) + zon.slice(1).toLowerCase()}</option>))}
                  </select>
                </div>
                <div className="relative flex items-center gap-1 md:gap-2">
                  <select className="bg-slate-100 dark:bg-slate-800 border-none text-slate-700 dark:text-slate-200 text-xs md:text-sm font-semibold rounded-md md:rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none w-[110px] sm:w-[130px] md:w-[180px] truncate p-1.5 md:p-2.5 cursor-pointer shadow-sm" value={selectedSchool} onChange={(e) => setSelectedSchool(e.target.value)}>
                    <option value="ALL">Semua Sekolah</option>
                    {availableSchools.map(school => (<option key={school} value={school}>{school}</option>))}
                  </select>
                </div>
                <div className="w-px h-6 md:h-8 bg-slate-200 dark:bg-slate-800 mx-1"></div>
                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 md:p-2.5 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-cyan-400 bg-slate-100 hover:bg-indigo-50 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg md:rounded-xl transition-all shadow-sm shrink-0">
                  {isDarkMode ? <CustomIcon name="Sun" className="w-4 h-4 md:w-5 md:h-5" /> : <CustomIcon name="Moon" className="w-4 h-4 md:w-5 md:h-5" />}
                </button>
              </div>
            </header>
            
            <div className={`flex-1 overflow-y-auto relative z-10 scrollbar-thin ${activeTab === 'dashboard' ? 'p-3 md:p-6' : 'p-0 md:p-4'}`}>
              <div className={`mx-auto h-full ${activeTab === 'dashboard' ? 'max-w-[1600px]' : 'max-w-full'}`}>
                {dataError && (
                  <div className="mx-auto max-w-[1600px] mb-4 bg-rose-100 border border-rose-200 text-rose-700 px-4 py-3 rounded-xl flex items-center gap-3 dark:bg-rose-500/10 dark:border-rose-500/20 dark:text-rose-400 shadow-sm mx-4 mt-4 md:mx-0 md:mt-0">
                    <CustomIcon name="AlertTriangle" className="w-6 h-6 shrink-0" />
                    <div>
                      <p className="text-sm font-bold">Gagal memuat turun data Google Sheets sebenar.</p>
                      <p className="text-xs font-medium mt-0.5">Sila pastikan <b>pautan Google Sheets masih sah (Publish to web)</b> dan tajuk lajur (contoh: NAMA, NAMA SEKOLAH) <b>tidak diubah</b>.</p>
                    </div>
                  </div>
                )}
                {isLoading ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 py-20">
                    <div className="relative w-12 h-12 md:w-16 md:h-16 mb-4 md:mb-6">
                      <div className="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
                      <div className="absolute inset-0 border-4 border-cyan-500 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p className="text-xs md:text-sm font-semibold tracking-wide animate-pulse text-indigo-900 dark:text-cyan-400">Sinkronisasi Data Google Sheets...</p>
                  </div>
                ) : (
                  renderContent()
                )}
              </div>
            </div>
          </main>
          
          {isSidebarOpen && (<div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity" onClick={() => setIsSidebarOpen(false)} />)}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
